<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Heist — Cybersecurity Roadmap</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --bg2: #111118;
  --bg3: #16161f;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --text: #e8e8f0;
  --muted: #7a7a8c;
  --dim: #3a3a4a;
  --red: #ff4757;
  --red-dim: rgba(255,71,87,0.12);
  --blue: #3d8ef5;
  --blue-dim: rgba(61,142,245,0.12);
  --green: #2ecc71;
  --green-dim: rgba(46,204,113,0.1);
  --amber: #f39c12;
  --amber-dim: rgba(243,156,18,0.1);
  --purple: #9b59b6;
  --purple-dim: rgba(155,89,182,0.1);
  --mono: 'Space Mono', monospace;
  --sans: 'DM Sans', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 15px;
  line-height: 1.6;
  min-height: 100vh;
}

/* SCAN LINE OVERLAY */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
  pointer-events: none;
  z-index: 0;
}

.layout { display: flex; min-height: 100vh; position: relative; z-index: 1; }

/* SIDEBAR */
.sidebar {
  width: 260px;
  flex-shrink: 0;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
}

.logo {
  padding: 24px 20px 16px;
  border-bottom: 1px solid var(--border);
}
.logo-tag {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--red);
  letter-spacing: .15em;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.logo-title {
  font-family: var(--mono);
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -.02em;
}
.logo-sub {
  font-size: 11px;
  color: var(--muted);
  margin-top: 3px;
}

.progress-wrap {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
}
.progress-label {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: var(--muted);
  margin-bottom: 8px;
  font-family: var(--mono);
}
.progress-bar {
  height: 3px;
  background: var(--dim);
  border-radius: 2px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--red);
  border-radius: 2px;
  transition: width .4s ease;
}

.nav { flex: 1; padding: 12px 0; }

.nav-month {
  padding: 8px 20px 4px;
  font-family: var(--mono);
  font-size: 9px;
  color: var(--dim);
  letter-spacing: .12em;
  text-transform: uppercase;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 20px;
  cursor: pointer;
  transition: background .15s;
  border-left: 2px solid transparent;
}
.nav-item:hover { background: rgba(255,255,255,0.03); }
.nav-item.active {
  background: var(--red-dim);
  border-left-color: var(--red);
}
.nav-item.completed { opacity: .5; }
.nav-item.completed .nav-dot { background: var(--green); }

.nav-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--dim);
  flex-shrink: 0;
  transition: background .2s;
}
.nav-item.active .nav-dot { background: var(--red); box-shadow: 0 0 6px var(--red); }

.nav-text { font-size: 13px; color: var(--muted); flex: 1; line-height: 1.3; }
.nav-item.active .nav-text { color: var(--text); }
.nav-week-num {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--dim);
}

/* MAIN */
.main { flex: 1; overflow-y: auto; }

.week-view { max-width: 820px; padding: 40px 48px; }

.breadcrumb {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.breadcrumb span { color: var(--red); }

.week-header { margin-bottom: 32px; }
.week-kicker {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--red);
  letter-spacing: .12em;
  text-transform: uppercase;
  margin-bottom: 10px;
}
.week-title {
  font-family: var(--mono);
  font-size: 28px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.2;
  margin-bottom: 12px;
}
.week-subtitle {
  font-size: 15px;
  color: var(--muted);
  max-width: 560px;
  line-height: 1.7;
}

.badges { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 32px; }
.badge {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: .08em;
  text-transform: uppercase;
  padding: 4px 10px;
  border-radius: 3px;
  border: 1px solid;
}
.badge-off { color: var(--red); border-color: rgba(255,71,87,0.3); background: var(--red-dim); }
.badge-def { color: var(--blue); border-color: rgba(61,142,245,0.3); background: var(--blue-dim); }
.badge-both { color: var(--amber); border-color: rgba(243,156,18,0.3); background: var(--amber-dim); }
.badge-tool { color: var(--muted); border-color: var(--border); background: transparent; }

/* SECTIONS */
.section { margin-bottom: 28px; }
.section-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
}
.section-icon {
  width: 28px;
  height: 28px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  flex-shrink: 0;
}
.icon-mission { background: var(--red-dim); color: var(--red); }
.icon-concept { background: var(--blue-dim); color: var(--blue); }
.icon-deliver { background: var(--green-dim); color: var(--green); }
.icon-commands { background: rgba(155,89,182,0.12); color: var(--purple); }
.icon-career { background: var(--amber-dim); color: var(--amber); }
.icon-plateau { background: rgba(255,255,255,0.05); color: var(--muted); }

.section-title {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--muted);
}

.section-body {
  font-size: 14px;
  color: #b8b8cc;
  line-height: 1.75;
}

/* DELIVER BOX */
.deliver-box {
  border: 1px solid rgba(46,204,113,0.2);
  background: rgba(46,204,113,0.05);
  border-radius: 8px;
  padding: 16px 20px;
  font-size: 14px;
  color: #c8f0da;
  line-height: 1.7;
  position: relative;
}
.deliver-box::before {
  content: '▶ DELIVERABLE';
  display: block;
  font-family: var(--mono);
  font-size: 9px;
  color: var(--green);
  letter-spacing: .12em;
  margin-bottom: 8px;
}

/* CODE BLOCKS */
.code-wrap { margin: 12px 0; }
.code-label {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--purple);
  letter-spacing: .08em;
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  gap: 6px;
}
pre {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 16px 18px;
  font-family: var(--mono);
  font-size: 12px;
  color: #c8c8e0;
  overflow-x: auto;
  line-height: 1.7;
  white-space: pre;
}
.comment { color: var(--muted); }
.cmd { color: #7ec8e3; }
.flag { color: #f39c12; }
.string { color: #2ecc71; }
.keyword { color: #ff6b9d; }

/* CAREER BOX */
.career-box {
  border-left: 2px solid var(--amber);
  padding: 12px 16px;
  background: var(--amber-dim);
  border-radius: 0 6px 6px 0;
  font-size: 13px;
  color: #d4a84b;
  line-height: 1.65;
}
.career-box strong { color: var(--amber); font-weight: 600; }

/* PLATEAU BOX */
.plateau-box {
  border: 1px dashed var(--border2);
  border-radius: 8px;
  padding: 14px 18px;
  font-size: 13px;
  color: var(--muted);
  line-height: 1.65;
}
.plateau-box strong { color: var(--text); }

/* TOOLS GRID */
.tools-grid { display: flex; gap: 8px; flex-wrap: wrap; }

/* NAV BUTTONS */
.week-nav {
  display: flex;
  gap: 12px;
  margin-top: 40px;
  padding-top: 24px;
  border-top: 1px solid var(--border);
}
.nav-btn {
  padding: 10px 20px;
  border-radius: 6px;
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--muted);
  font-family: var(--mono);
  font-size: 12px;
  cursor: pointer;
  transition: all .15s;
  display: flex;
  align-items: center;
  gap: 8px;
}
.nav-btn:hover { border-color: var(--red); color: var(--text); background: var(--red-dim); }
.nav-btn.primary { background: var(--red); border-color: var(--red); color: #fff; }
.nav-btn.primary:hover { background: #e63950; }
.nav-btn:disabled { opacity: .3; pointer-events: none; }

/* MONTH OVERVIEW */
.month-overview {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 20px 24px;
  margin-bottom: 32px;
}
.month-title-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 8px;
}
.month-num {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--red);
  letter-spacing: .1em;
}
.month-name {
  font-family: var(--mono);
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
}
.month-tagline {
  font-size: 13px;
  color: var(--muted);
  font-style: italic;
}
.month-weeks-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-top: 16px;
}
.mw-item {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 10px 12px;
  cursor: pointer;
  transition: all .15s;
  font-size: 12px;
}
.mw-item:hover { border-color: var(--border2); background: var(--bg); }
.mw-item.cur { border-color: var(--red); background: var(--red-dim); }
.mw-num { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-bottom: 3px; }
.mw-title { color: var(--text); font-size: 12px; line-height: 1.3; }
.mw-badge { margin-top: 5px; display: inline-block; font-family: var(--mono); font-size: 9px; padding: 1px 5px; border-radius: 2px; }

/* OVERVIEW PAGE */
.overview-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
  margin-bottom: 32px;
}
.ov-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 18px 20px;
  cursor: pointer;
  transition: all .2s;
  position: relative;
  overflow: hidden;
}
.ov-card::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 2px;
  background: var(--red);
  transform: scaleX(0);
  transition: transform .2s;
  transform-origin: left;
}
.ov-card:hover::after { transform: scaleX(1); }
.ov-card:hover { border-color: var(--border2); }
.ov-month-num { font-family: var(--mono); font-size: 11px; color: var(--red); margin-bottom: 6px; }
.ov-month-title { font-family: var(--mono); font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
.ov-month-tag { font-size: 12px; color: var(--muted); font-style: italic; margin-bottom: 12px; }
.ov-weeks { font-size: 11px; color: var(--dim); }

/* INTRO HERO */
.hero {
  padding: 60px 48px 40px;
  border-bottom: 1px solid var(--border);
  max-width: 820px;
}
.hero-kicker {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--red);
  letter-spacing: .15em;
  text-transform: uppercase;
  margin-bottom: 16px;
}
.hero-title {
  font-family: var(--mono);
  font-size: 42px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.1;
  margin-bottom: 16px;
}
.hero-title em { color: var(--red); font-style: normal; }
.hero-sub {
  font-size: 16px;
  color: var(--muted);
  max-width: 540px;
  line-height: 1.7;
  margin-bottom: 28px;
}
.hero-stats {
  display: flex;
  gap: 32px;
}
.stat { }
.stat-num { font-family: var(--mono); font-size: 24px; font-weight: 700; color: var(--text); }
.stat-label { font-size: 12px; color: var(--muted); margin-top: 2px; }

/* RULE CARD */
.rules-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin: 24px 0;
}
.rule-item {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px 16px;
  font-size: 13px;
  color: var(--muted);
  line-height: 1.5;
  display: flex;
  gap: 10px;
}
.rule-num {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--red);
  flex-shrink: 0;
  margin-top: 1px;
}

/* DIVIDER */
.divider { border: none; border-top: 1px solid var(--border); margin: 24px 0; }

/* SCROLLBAR */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 2px; }

@media (max-width: 900px) {
  .sidebar { display: none; }
  .week-view { padding: 24px 20px; }
  .overview-grid { grid-template-columns: 1fr 1fr; }
  .month-weeks-grid { grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body>

<div class="layout">
  <!-- SIDEBAR -->
  <nav class="sidebar" id="sidebar">
    <div class="logo">
      <div class="logo-tag">// classified</div>
      <div class="logo-title">THE HEIST</div>
      <div class="logo-sub">6-month cyber training program</div>
    </div>
    <div class="progress-wrap">
      <div class="progress-label">
        <span>PROGRESS</span>
        <span id="progress-pct">0 / 24 weeks</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    </div>
    <div class="nav" id="nav-list"></div>
  </nav>

  <!-- MAIN -->
  <main class="main" id="main-content"></main>
</div>

<script>
const MONTHS = [
  {
    num: 1,
    title: "Recon & Footprinting",
    tagline: "You are a ghost. Learn to see without being seen.",
    weeks: [
      {
        title: "Your attack machine is alive",
        type: "both",
        concept: "Before you break anything, you need a safe lab. You'll install Kali Linux in VirtualBox, create isolated NAT-only networks so you can attack things without touching your real network, and run your first real recon commands against TryHackMe's starting rooms. This week is about building the environment that every future week depends on.",
        commands: [
          {
            label: "First boot — update Kali",
            code: `sudo apt update && sudo apt upgrade -y\n\n<span class="comment"># Add yourself to sudoers if needed</span>\nsu -c "usermod -aG sudo kali" root`
          },
          {
            label: "Connect to TryHackMe VPN",
            code: `<span class="comment"># Download .ovpn config from TryHackMe dashboard</span>\nsudo openvpn ~/Downloads/your-thm-config.ovpn\n\n<span class="comment"># Verify connection (you should see a tun0 interface)</span>\nip a | grep tun0`
          },
          {
            label: "Your first nmap scans",
            code: `<span class="comment"># Basic scan — what ports are open?</span>\nnmap 10.10.x.x\n\n<span class="comment"># Service + version detection</span>\nnmap -sV 10.10.x.x\n\n<span class="comment"># Stealth SYN scan (harder to detect)</span>\nsudo nmap -sS 10.10.x.x\n\n<span class="comment"># Save output — do this every time</span>\nnmap -sV 10.10.x.x -oN week1_scan.txt`
          }
        ],
        deliver: "A live Kali VM running nmap — scan TryHackMe's Starting Out room and produce a port map. Screenshot it. Show anyone: \"This is exactly what a hacker sees first on a target.\"",
        tools: ["VirtualBox", "Kali Linux", "nmap", "TryHackMe"],
        career: "<strong>Role: Junior Penetration Tester / SOC Analyst.</strong> Every professional pentest begins with exactly this — a port map of the target. This is Day 1 skill on any security team, and what every entry-level certification tests.",
        plateau: "<strong>Too easy?</strong> Do TryHackMe's 'Advent of Cyber' Days 1-5. Or scan your home router (it's yours — legal) and document every open service. Research whether any are known-vulnerable using CVE Details."
      },
      {
        title: "Network fingerprinting",
        type: "off",
        concept: "nmap isn't just ping. You'll learn service detection, OS fingerprinting, and stealth scanning — and run Wireshark live alongside nmap to watch your own packets hit the wire. The goal is to understand every byte you send before you send it. Passive reconnaissance is invisible. This is what it looks like.",
        commands: [
          {
            label: "Advanced nmap — the pentest standard",
            code: `<span class="comment"># Full port scan + service detection + OS fingerprint</span>\nsudo nmap -sS -sV -O -p- --min-rate 5000 10.10.x.x -oN full_scan.txt\n\n<span class="comment"># NSE script scan (runs vulnerability checks)</span>\nnmap -sC -sV 10.10.x.x\n\n<span class="comment"># Scan specific ports only</span>\nnmap -p 22,80,443,8080 -sV 10.10.x.x\n\n<span class="comment"># Slow scan — evades basic IDS</span>\nnmap -sS -T1 10.10.x.x`
          },
          {
            label: "Wireshark filters to know cold",
            code: `<span class="comment"># Show traffic to/from one IP</span>\nip.addr == 10.10.x.x\n\n<span class="comment"># SYN packets only — see nmap's fingerprint</span>\ntcp.flags.syn == 1 && tcp.flags.ack == 0\n\n<span class="comment"># HTTP traffic</span>\nhttp\n\n<span class="comment"># DNS queries only</span>\ndns\n\n<span class="comment"># Right-click any packet → Follow → TCP Stream</span>\n<span class="comment"># Reconstructs the entire conversation in plain text</span>`
          }
        ],
        deliver: "A dual-pane screenshot: nmap output on the left showing open ports and services, Wireshark on the right showing the exact SYN packets that produced it. You understand every byte you sent.",
        tools: ["nmap", "Wireshark", "TryHackMe — Network Fundamentals"],
        career: "<strong>Role: Threat Hunter / SOC Analyst L1.</strong> Identifying services and OS from packets is the core technical skill in incident response. SOC interviews frequently include a live Wireshark interpretation challenge.",
        plateau: "<strong>Too easy?</strong> Try nmap's scripting engine: <code>nmap --script=vuln 10.10.x.x</code>. It runs 600+ vulnerability checks automatically. Document every finding."
      },
      {
        title: "Password cracking: your first real crack",
        type: "off",
        concept: "Learn how passwords are stored as hashes — not in plaintext — and why that matters. You'll use Hashcat with rockyou.txt (14 million real leaked passwords) to crack MD5 and SHA1 hashes in seconds. Then you'll try bcrypt and watch it take hours. That contrast is the lesson. Theory follows doing here: you see why salting works by experiencing what happens without it.",
        commands: [
          {
            label: "Understand hashing first — run this",
            code: `<span class="keyword">import</span> hashlib\n\npassword = <span class="string">"password123"</span>\nmd5  = hashlib.md5(password.encode()).hexdigest()\nsha1 = hashlib.sha1(password.encode()).hexdigest()\n\n<span class="keyword">print</span>(<span class="string">f"MD5:  {md5}"</span>)\n<span class="keyword">print</span>(<span class="string">f"SHA1: {sha1}"</span>)\n\n<span class="comment"># Change one character — entire hash changes</span>\npassword2 = <span class="string">"password124"</span>\nmd5_2 = hashlib.md5(password2.encode()).hexdigest()\n<span class="keyword">print</span>(<span class="string">f"MD5 (changed): {md5_2}"</span>)`
          },
          {
            label: "Hashcat — crack your first hash",
            code: `<span class="comment"># Unzip rockyou wordlist (already on Kali)</span>\nsudo gunzip /usr/share/wordlists/rockyou.txt.gz\n\n<span class="comment"># Save a hash to crack</span>\necho "5f4dcc3b5aa765d61d8327deb882cf99" > hash.txt\n\n<span class="comment"># -m 0 = MD5, -m 100 = SHA1, -m 1800 = SHA512</span>\nhashcat -m 0 hash.txt /usr/share/wordlists/rockyou.txt\n\n<span class="comment"># Show cracked result</span>\nhashcat -m 0 hash.txt /usr/share/wordlists/rockyou.txt --show\n\n<span class="comment"># Rule-based attack — mutates words (password → P@ssw0rd)</span>\nhashcat -m 0 hash.txt /usr/share/wordlists/rockyou.txt \\\n  -r /usr/share/hashcat/rules/best64.rule`
          }
        ],
        deliver: "Screenshot of Hashcat cracking at least 3 hashes from TryHackMe's 'Crack the Hash' room, showing plaintext next to hash, with crack time visible. Then try bcrypt — document the speed difference.",
        tools: ["Hashcat", "rockyou.txt", "TryHackMe — Crack the Hash"],
        career: "<strong>Role: Penetration Tester / Digital Forensics Analyst.</strong> Password auditing is a required deliverable in pentests and breach investigations. Knowing Hashcat modes and wordlists is tested in eJPT, OSCP, and CEH.",
        plateau: "<strong>Too easy?</strong> Try cracking a salted SHA256 hash. Add custom rules to Hashcat. Try John the Ripper as an alternative — same concept, different syntax, shows you why tool diversity matters."
      },
      {
        title: "Build your first defense: a honeypot",
        type: "def",
        concept: "Now you flip sides. OpenCanary (free, Python-based) deploys fake services — SSH, HTTP, FTP — that log everything that touches them. Let it run for 48 hours and watch real attack data fill your logs. Automated bots scan the entire internet constantly. This week you make yourself visible to them intentionally, so you can study what they do.",
        commands: [

// State
let currentWeekIdx = -1; // -1 = overview
let completedWeeks = new Set();

function getAllWeeks() {
  const all = [];
  MONTHS.forEach((m, mi) => {
    m.weeks.forEach((w, wi) => {
      all.push({ month: m, monthIdx: mi, week: w, weekIdx: wi, globalIdx: all.length });
    });
  });
  return all;
}

function buildNav() {
  const nav = document.getElementById('nav-list');
  nav.innerHTML = '';
  const all = getAllWeeks();
  let lastMonth = -1;

  // Overview item
  const ovItem = document.createElement('div');
  ovItem.className = 'nav-item' + (currentWeekIdx === -1 ? ' active' : '');
  ovItem.innerHTML = `<div class="nav-dot"></div><div class="nav-text">Overview</div>`;
  ovItem.onclick = () => navigate(-1);
  nav.appendChild(ovItem);

  all.forEach(({ month, monthIdx, week, weekIdx, globalIdx }) => {
    if (monthIdx !== lastMonth) {
      const mLabel = document.createElement('div');
      mLabel.className = 'nav-month';
      mLabel.textContent = `M${month.num} — ${month.title}`;
      nav.appendChild(mLabel);
      lastMonth = monthIdx;
    }
    const item = document.createElement('div');
    item.className = 'nav-item' +
      (currentWeekIdx === globalIdx ? ' active' : '') +
      (completedWeeks.has(globalIdx) ? ' completed' : '');
    item.innerHTML = `
      <div class="nav-dot"></div>
      <div class="nav-text">${week.title}</div>
      <div class="nav-week-num">W${globalIdx + 1}</div>
    `;
    item.onclick = () => navigate(globalIdx);
    nav.appendChild(item);
  });
}

function updateProgress() {
  const total = getAllWeeks().length;
  const done = completedWeeks.size;
  document.getElementById('progress-pct').textContent = `${done} / ${total} weeks`;
  document.getElementById('progress-fill').style.width = `${(done / total) * 100}%`;
}

function navigate(idx) {
  currentWeekIdx = idx;
  buildNav();
  renderMain();
  document.querySelector('.main').scrollTop = 0;
}

function renderMain() {
  const main = document.getElementById('main-content');
  if (currentWeekIdx === -1) {
    renderOverview(main);
  } else {
    renderWeek(main, currentWeekIdx);
  }
}

function renderOverview(main) {
  const html = `
    <div class="hero">
      <div class="hero-kicker">// 6-month program · 24 weeks · build everything</div>
      <h1 class="hero-title">The<br><em>Heist</em><br>Program</h1>
      <p class="hero-sub">A hands-on cybersecurity roadmap for CS/FinTech students. Every week ends with something real — something you can run, show, and feel. No theory-only weeks.</p>
      <div class="hero-stats">
        <div class="stat"><div class="stat-num">24</div><div class="stat-label">weeks of projects</div></div>
        <div class="stat"><div class="stat-num">12</div><div class="stat-label">offensive skills</div></div>
        <div class="stat"><div class="stat-num">12</div><div class="stat-label">defensive skills</div></div>
        <div class="stat"><div class="stat-num">$0</div><div class="stat-label">tools cost</div></div>
      </div>
    </div>
    <div class="week-view">
      <div class="rules-grid">
        ${[
          ["01","Every week ends with a working hack, defense, or tool — something you can run and show."],
          ["02","Projects stack — each one builds on the last. Nothing is throwaway."],
          ["03","Attack or defend first. Understand the theory after."],
          ["04","Every project must pass the 30-second test: dangerous or impressive?"],
          ["05","Every project connects explicitly to a real role or skill — employable or dangerous."],
          ["06","Both sides — offensive and defensive — every month."],
          ["07","Free tools only: Kali, TryHackMe, HackTheBox, Wireshark, Metasploit."],
          ["08","Plateau? Harder target or CTF challenge. Never a new topic."]
        ].map(([n, t]) => `
          <div class="rule-item">
            <span class="rule-num">${n}</span>
            <span>${t}</span>
          </div>
        `).join('')}
      </div>
      <hr class="divider">
      <div class="overview-grid">
        ${MONTHS.map((m, mi) => `
          <div class="ov-card" onclick="navigate(${getAllWeeks().findIndex(w => w.monthIdx === mi)})">
            <div class="ov-month-num">MONTH ${m.num}</div>
            <div class="ov-month-title">${m.title}</div>
            <div class="ov-month-tag">${m.tagline}</div>
            <div class="ov-weeks">${m.weeks.map(w => w.title).join(' · ')}</div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
  main.innerHTML = html;
}

function renderWeek(main, gIdx) {
  const all = getAllWeeks();
  const { month, monthIdx, week, weekIdx, globalIdx } = all[gIdx];
  const typeLabel = week.type === 'off' ? 'Offensive' : week.type === 'def' ? 'Defensive' : 'Both sides';
  const typeCls = `badge-${week.type}`;

  // Month mini-map
  const monthWeeks = all.filter(w => w.monthIdx === monthIdx);
  const monthMiniMap = `
    <div class="month-overview">
      <div class="month-title-row">
        <span class="month-num">MONTH ${month.num}</span>
        <span class="month-name">${month.title}</span>
      </div>
      <div class="month-tagline">${month.tagline}</div>
      <div class="month-weeks-grid">
        ${monthWeeks.map(mw => `
          <div class="mw-item ${mw.globalIdx === gIdx ? 'cur' : ''}" onclick="navigate(${mw.globalIdx})">
            <div class="mw-num">W${mw.globalIdx + 1}</div>
            <div class="mw-title">${mw.week.title}</div>
            <span class="mw-badge ${mw.week.type === 'off' ? 'badge-off' : mw.week.type === 'def' ? 'badge-def' : 'badge-both'}">${mw.week.type === 'off' ? 'OFF' : mw.week.type === 'def' ? 'DEF' : 'BOTH'}</span>
          </div>
        `).join('')}
      </div>
    </div>
  `;

  const commandsHTML = week.commands.map(c => `
    <div class="code-wrap">
      <div class="code-label">$ ${c.label}</div>
      <pre>${c.code}</pre>
    </div>
  `).join('');

  const html = `
    <div class="week-view">
      <div class="breadcrumb">
        <span style="cursor:pointer;color:var(--muted)" onclick="navigate(-1)">Overview</span>
        → <span>Month ${month.num}: ${month.title}</span>
        → <span>Week ${gIdx + 1}</span>
      </div>
      ${monthMiniMap}
      <div class="week-header">
        <div class="week-kicker">WEEK ${gIdx + 1} OF 24</div>
        <h1 class="week-title">${week.title}</h1>
        <p class="week-subtitle">${week.concept}</p>
      </div>
      <div class="badges">
        <span class="badge ${typeCls}">${typeLabel}</span>
        ${week.tools.map(t => `<span class="badge badge-tool">${t}</span>`).join('')}
      </div>

      <div class="section">
        <div class="section-header">
          <div class="section-icon icon-commands">▶</div>
          <div class="section-title">Commands & Code</div>
        </div>
        <div class="section-body">${commandsHTML}</div>
      </div>

      <div class="section">
        <div class="section-header">
          <div class="section-icon icon-deliver">✓</div>
          <div class="section-title">Deliverable</div>
        </div>
        <div class="deliver-box">${week.deliver}</div>
      </div>

      <div class="section">
        <div class="section-header">
          <div class="section-icon icon-career">$</div>
          <div class="section-title">Career Connection</div>
        </div>
        <div class="career-box">${week.career}</div>
      </div>

      <div class="section">
        <div class="section-header">
          <div class="section-icon icon-plateau">↑</div>
          <div class="section-title">Plateau Protocol</div>
        </div>
        <div class="plateau-box">${week.plateau}</div>
      </div>

      <div class="week-nav">
        <button class="nav-btn" onclick="navigate(${gIdx - 1})" ${gIdx === 0 ? 'disabled' : ''}>← Week ${gIdx}</button>
        <button class="nav-btn" onclick="markDone(${gIdx})" style="${completedWeeks.has(gIdx) ? 'opacity:.4' : ''}">
          ${completedWeeks.has(gIdx) ? '✓ Completed' : 'Mark complete'}
        </button>
        <button class="nav-btn primary" onclick="navigate(${gIdx + 1})" ${gIdx === 23 ? 'disabled' : ''}>Week ${gIdx + 2} →</button>
      </div>
    </div>
  `;
  main.innerHTML = html;
}

function markDone(idx) {
  if (completedWeeks.has(idx)) {
    completedWeeks.delete(idx);
  } else {
    completedWeeks.add(idx);
  }
  updateProgress();
  buildNav();
  renderMain();
}

// Init
buildNav();
updateProgress();
renderOverview(document.getElementById('main-content'));
</script>
</body>
</html>
